<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="The Rafting website this website contains the info for a rafting website and their contact info, this is surely something you will read for sure">
    <meta name="author" content="Franco Sanchez">
    <title>Contact Us White Water Rafting.</title>
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <img src="images/logo.png" alt="WWR logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="shower">
            <h3>SPLASH: WHITE WATER RAFTING Company</h3>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </div>
        <div>
            <section class="map">
                <div class="gmap"><iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d699.4322143591714!2d-117.66457898572162!3d33.49932005194058!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80dcf1e87c8af9e3%3A0xc4f4de7ad0f56614!2sVasquez%20Studios!5e0!3m2!1ses!2sar!4v1775324861962!5m2!1ses!2sar"
                      allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe></div>

                <form>
                    <fieldset>
                        <div class="form-item column1">
                            <label for="fullname">Name</label>
                            <input type="text" name="fullname" id="fullname"
                              placeholder="placeholder" required>
                        </div>
                        <div class="form-item column1">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email"
                              placeholder="email@email.com" required>
                        </div>
                        <div class="form-item column2">
                            <label>Message purpose</label>
                            <div class="form-item radio_option">
                                <input type="radio" name="purpose" id="General_Inquiry"
                                  value="General_Inquiry">
                                <label for="General Inquiry">General
                                    Inquiry</label>
                                <input type="radio" name="purpose" id="Reservation_Question"
                                  value="Reservation_Question">
                                <label for="Reservation Question">Reservation Question</label>
                                <input type="radio" name="purpose" id="Website_Suggestion"
                                  value="Website_Suggestion">
                                <label for="Website Suggestion">Website Suggestion</label>

                            </div>
                        </div>
                        <div class="form-item column3">
                            <label for="Message">Message</label>
                            <textarea name="Message" id="Message">type here</textarea>
                        </div>
                        <div class="form-item column4">
                            <input type="checkbox" name="checkbox" id="checkbox">
                            <label for="checkbox">please subscribe me to the monthyly
                                newsletter</label>
                        </div>

                        <button class="submitb" type="submit">Get in touch!</button>
                    </fieldset>
                </form>
            </section>
            <section class="aboutfigure">
                <h2>We are here to serve you</h2>
                <figure>
                    <img src="images/employeeone.jpg" alt="employee1">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employeeone.jpg" alt="employee1">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employeeone.jpg" alt="employee1">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </section>
        </div>
    </main>
    <footer>
        <p>©2026 SPLASH White Water Rafting, Franco Sanchez</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram icon">
            </a>
        </nav>

    </footer>
</body>

</html>
