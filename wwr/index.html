<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="The Rafting website this website contains the info for a rafting website and the main page, this is surely something you will read for sure">
    <meta name="author" content="Franco Sanchez">
    <title>SPLASH White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <img src="images/logo.png" alt="WWR logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero"><img src="images/hero.jpg" alt="Hero image WWR">
            <h1>SPLASH: WHITE WATER RAFTING</h1>
            <article>
                <h2>Adventure just for you!</h2>
            </article>
        </div>
        <section class="rebang">
            <h2>Interested?</h2>
            <p>Subscribe to our newsletter!</p>
            <form>
                <fieldset>
                    <div class="form-item column1">
                        <label for="fullname">Name</label>
                        <input type="text" name="fullname" id="fullname" placeholder="placeholder"
                          required>
                    </div>
                    <div class="form-item column1">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="email@email.com"
                          required>
                </fieldset>
            </form>
        </section>
        <div class="hero second">
            <img src="images/raft7.jpg" alt="Jump in!">
            <article>
                <a href="trips.html">
                    <h2>Click here for Adventure!</h2>
                </a>
            </article>
        </div>

        <section class="index-cap">
            <h2>Adventure Awaits You!</h2>
            <figure>
                <img src="images/raft1.jpg" alt="raft1">
                <figcaption>Adventure!</figcaption>
            </figure>
            <figure>
                <img src="images/raft2.jpg" alt="raft2">
                <figcaption>Adrenaline!</figcaption>
            </figure>
            <figure>
                <img src="images/raft3.jpg" alt="raft3">
                <figcaption>New friendships!</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 SPLASH White Water Rafting, Franco Sanchez</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram icon">
            </a>
        </nav>

    </footer>
</body>

</html>
