<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>✅Basic HTML and CSS QUIZ</h1>
    </header>
    <main>
        <form>
            <div class="quiz-item">
                <label for="q1">1. What does CSS stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="quiz-item">
                <label for="q2">2. How are id and class attributes selected in CSS?</label>
                <textarea name="q2" id="q2"></textarea>
            </div>

            <div class="quiz-item">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="1">/#Comment#/</option>
                    <option value="2">"Comment"</option>
                    <option value="3">&lt;!--Comment--&gt;</option>
                </select>
            </div>

            <div class="quiz-item">
                <label for="q4">What is the bottom margin given this declaration?</label>
                <code>margin; 10px 5px 15px;</code>
                <input type="number" name="q4" id="q4">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>


    </main>
    <footer>
        <p>©2026 Franco Sanchez Mendoza, Argentina</p>
    </footer>
</body>

</html>
