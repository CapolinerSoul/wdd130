<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML FORM - USER POLL</title>
    <link rel="stylesheet" href="styles/poll-form.css">

</head>

<body>
    <header>
        <h1>WDD 130 | HTML FORM - USER POLL
        </h1>
    </header>
    <main>
        <form>
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>
            <div class="form-item column1">
                <label for="favbrowser">What's your favorite browser</label>
            </div>
            <div class="form-item column1">
                <select name="favbrowser" id="favbrowser">
                    <option value="1">Safari</option>
                    <option value="2">Chrome</option>
                    <option value="3">Edge</option>
                    <option value="4">Brave</option>
                    <option value="5">Other</option>
                </select>
            </div>

            <label for="pet">Do you have a Household pet?</label>
            <input type="checkbox" id="pet" name="pet">
            <label for="feedback">List the places you have lived:</label>
            <textarea name="feedback" id="feedback" rows="4"
              placeholder="Maipu, Mendoza, Godoy Cruz"></textarea>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©2026 Franco Sanchez Mendoza, Argentina</p>
    </footer>
</body>

</html>
